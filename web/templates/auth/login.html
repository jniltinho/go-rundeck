<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Go-Rundeck</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0C0C0C] min-h-screen flex items-start justify-center pt-[5vh]">

<div class="w-full max-w-md px-4">
  <!-- Logo / Brand -->
  <div class="text-center mb-8">
    <div class="inline-block bg-[#FF5C00] border-4 border-white px-6 py-3 shadow-[1px_1px_0_white]">
      <span class="text-white font-mono font-bold text-3xl tracking-widest">[RUNDECK]</span>
    </div>
    <p class="text-gray-400 font-mono text-sm mt-3">runbook automation platform</p>
  </div>

  <!-- Card -->
  <div class="bg-[#F5F0E8] border-4 border-white shadow-[2px_2px_0_#FF5C00] p-8">
    <h2 class="text-2xl font-bold font-mono mb-6 border-b-4 border-[#0C0C0C] pb-3">
      _ sign in
    </h2>

    {{if .Error}}
    <div class="mb-4 px-4 py-3 bg-red-100 border-2 border-red-600 font-mono text-sm text-red-700 shadow-[1px_1px_0_#0C0C0C]">
      &#9888; {{.Error}}
    </div>
    {{end}}

    <form method="POST" action="/login" class="space-y-4">
      <div>
        <label class="block text-xs font-mono font-bold uppercase tracking-widest mb-1">
          Username
        </label>
        <input
          type="text"
          name="username"
          required
          autofocus
          class="w-full px-3 py-2 bg-white border-2 border-[#0C0C0C] font-mono text-sm focus:outline-none focus:border-[#FF5C00] shadow-[1px_1px_0_#0C0C0C]"
          placeholder="admin"
        >
      </div>

      <div>
        <label class="block text-xs font-mono font-bold uppercase tracking-widest mb-1">
          Password
        </label>
        <input
          type="password"
          name="password"
          required
          class="w-full px-3 py-2 bg-white border-2 border-[#0C0C0C] font-mono text-sm focus:outline-none focus:border-[#FF5C00] shadow-[1px_1px_0_#0C0C0C]"
          placeholder="••••••••"
        >
      </div>

      <button
        type="submit"
        class="w-full py-3 bg-[#FF5C00] border-2 border-[#0C0C0C] font-mono font-bold text-white text-sm uppercase tracking-widest shadow-[1px_1px_0_#0C0C0C] hover:translate-y-[-1px] hover:shadow-[1px_1px_0_#0C0C0C] active:translate-y-[1px] active:shadow-[1px_1px_0_#0C0C0C] transition-all">
        [ENTER] &rarr;
      </button>
    </form>
  </div>

  <p class="text-center text-gray-600 font-mono text-xs mt-4">
    <a href="https://github.com/jniltinho/go-rundeck" target="_blank" class="hover:text-gray-400 transition-colors">Go-Rundeck</a> {{.Version}} &mdash; built with Go
  </p>
</div>

</body>
</html>
