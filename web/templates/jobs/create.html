{{template "layout/base.html" .}}

{{define "content"}}
<div class="space-y-6 max-w-2xl">
  <div>
    <p class="text-xs font-mono text-gray-500">
      <a href="/projects" class="hover:text-[#FF5C00]">projects</a> /
      <a href="/projects/{{.Project.ID}}" class="hover:text-[#FF5C00]">{{.Project.Name}}</a> /
      <a href="/projects/{{.Project.ID}}/jobs" class="hover:text-[#FF5C00]">jobs</a> / new
    </p>
    <h2 class="text-2xl font-bold font-mono mt-1">New Job</h2>
  </div>

  <div class="bg-white border-4 border-[#0C0C0C] shadow-[3px_3px_0_#0C0C0C] p-6">
    <form method="POST" action="/projects/{{.Project.ID}}/jobs" class="space-y-4">

      <div>
        <label class="block text-xs font-mono font-bold uppercase tracking-widest mb-1">Job Name *</label>
        <input type="text" name="name" required
               class="w-full px-3 py-2 bg-white border-2 border-[#0C0C0C] font-mono text-sm focus:outline-none focus:border-[#FF5C00] shadow-[1px_1px_0_#0C0C0C]"
               placeholder="Deploy Application">
      </div>

      <div>
        <label class="block text-xs font-mono font-bold uppercase tracking-widest mb-1">Description</label>
        <textarea name="description" rows="2"
                  class="w-full px-3 py-2 bg-white border-2 border-[#0C0C0C] font-mono text-sm focus:outline-none focus:border-[#FF5C00] shadow-[1px_1px_0_#0C0C0C]"
                  placeholder="What does this job do?"></textarea>
      </div>

      <div>
        <label class="block text-xs font-mono font-bold uppercase tracking-widest mb-1">Node Filter</label>
        <input type="text" name="node_filter" value="*"
               class="w-full px-3 py-2 bg-white border-2 border-[#0C0C0C] font-mono text-sm focus:outline-none focus:border-[#FF5C00] shadow-[1px_1px_0_#0C0C0C]"
               placeholder="* or tag:prod or name-pattern">
        <p class="text-xs font-mono text-gray-400 mt-1">Use * for all nodes, tag:&lt;value&gt; for tag filter, or name pattern.</p>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-mono font-bold uppercase tracking-widest mb-1">Execution Strategy</label>
          <select name="exec_strategy"
                  class="w-full px-3 py-2 bg-white border-2 border-[#0C0C0C] font-mono text-sm focus:outline-none focus:border-[#FF5C00] shadow-[1px_1px_0_#0C0C0C]">
            <option value="sequential">Sequential</option>
            <option value="parallel">Parallel</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-mono font-bold uppercase tracking-widest mb-1">On Step Error</label>
          <select name="on_error"
                  class="w-full px-3 py-2 bg-white border-2 border-[#0C0C0C] font-mono text-sm focus:outline-none focus:border-[#FF5C00] shadow-[1px_1px_0_#0C0C0C]">
            <option value="stop">Stop</option>
            <option value="continue">Continue</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-xs font-mono font-bold uppercase tracking-widest mb-1">Timeout (seconds)</label>
        <input type="number" name="timeout_sec" value="300" min="1"
               class="w-full px-3 py-2 bg-white border-2 border-[#0C0C0C] font-mono text-sm focus:outline-none focus:border-[#FF5C00] shadow-[1px_1px_0_#0C0C0C]">
      </div>

      <div class="flex gap-3 pt-2 border-t-2 border-[#0C0C0C]">
        <button type="submit"
                class="flex-1 py-2 bg-[#FF5C00] border-2 border-[#0C0C0C] text-white font-mono font-bold text-sm shadow-[2px_2px_0_#0C0C0C] hover:shadow-[3px_3px_0_#0C0C0C] transition-all">
          Create Job
        </button>
        <a href="/projects/{{.Project.ID}}/jobs"
           class="flex-1 py-2 text-center bg-white border-2 border-[#0C0C0C] font-mono font-bold text-sm shadow-[2px_2px_0_#0C0C0C] hover:bg-[#F5F0E8] transition-all">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{{end}}
