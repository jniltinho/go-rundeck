{{define "layout/sidebar.html"}}
<aside class="w-64 bg-[#0C0C0C] text-white flex flex-col border-r-4 border-[#FF5C00] flex-shrink-0">
  <div class="px-6 h-16 flex flex-col justify-center border-b-2 border-[#FF5C00]">
    <a href="/" class="flex items-center gap-2">
      <span class="text-[#FF5C00] font-mono font-bold text-xl tracking-tight">[RUN]</span>
      <span class="font-bold text-lg tracking-wide">DECK</span>
    </a>
    <p class="text-xs text-gray-400 font-mono mt-1">runbook automation</p>
  </div>

  <nav class="flex-1 px-4 py-6 space-y-1 overflow-y-auto">
    <a href="/"
       class="flex items-center gap-3 px-3 py-2 text-sm font-medium border-2 border-transparent hover:border-[#FF5C00] hover:bg-[#FF5C00] hover:text-black transition-colors">
      <i data-lucide="layout-dashboard" class="w-4 h-4 text-[#FFD600]"></i> Dashboard
    </a>

    <div class="pt-4 pb-1">
      <p class="px-3 text-xs font-mono text-gray-500 uppercase tracking-widest">Resources</p>
    </div>

    <a href="/projects"
       class="flex items-center gap-3 px-3 py-2 text-sm font-medium border-2 border-transparent hover:border-[#FF5C00] hover:bg-[#FF5C00] hover:text-black transition-colors">
      <i data-lucide="folder" class="w-4 h-4 text-[#FFD600]"></i> Projects
    </a>

    <div class="pt-4 pb-1">
      <p class="px-3 text-xs font-mono text-gray-500 uppercase tracking-widest">System</p>
    </div>

    <a href="/keys"
       class="flex items-center gap-3 px-3 py-2 text-sm font-medium border-2 border-transparent hover:border-[#FF5C00] hover:bg-[#FF5C00] hover:text-black transition-colors">
      <i data-lucide="key-round" class="w-4 h-4 text-[#FFD600]"></i> Key Storage
    </a>

    {{if eq (printf "%s" .Role) "admin"}}
    <a href="/users"
       class="flex items-center gap-3 px-3 py-2 text-sm font-medium border-2 border-transparent hover:border-[#FF5C00] hover:bg-[#FF5C00] hover:text-black transition-colors">
      <i data-lucide="users" class="w-4 h-4 text-[#FFD600]"></i> Users
    </a>
    {{end}}

    <span class="flex items-center gap-3 px-3 py-2 text-sm font-medium border-2 border-transparent opacity-40 cursor-not-allowed">
      <i data-lucide="settings" class="w-4 h-4 text-[#FFD600]"></i> Settings
    </span>
  </nav>

</aside>
{{end}}
